<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Transaksi</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/transaksi.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">



</head>
<body>
  <main class="phone-shell">
    <section class="app-screen">




      <!-- Dashboard Content -->
      <section class="transaksi-main">

        <!-- Header -->
        <div class="transaksi-page">

          <!-- TOP NAVBAR -->
          <div class="topbar">
            <h2 class="topbar-title">Transaksi</h2>
          </div>


        </div>



        <!-- =========================
        TOGGLE
        ========================= -->
        <div class="toggle-wrapper">
          <button id="masukBtn" class="toggle-btn">Masuk</button>
          <button id="keluarBtn" class="toggle-btn">Keluar</button>
        </div>

        <!-- =========================
            TAB CONTENT
        ========================= -->

        <!-- =========================
        📥 TAB MASUK (FIREBASE TRANSAKSI)
        ========================= -->
        <div id="masukContent" class="tab-content">

          <!-- LIST TRANSAKSI -->
          <div id="transaksiMasuk" class="trx-list"></div>

        </div>




        <div id="keluarContent" style="display:none;">

          <div class="input-group">
            <label class="input-label">Nominal (Rp)</label>
            
            <div class="input-wrapper">
              <span class="currency"></span>
              <input 
                type="text" 
                id="saldoAwalInput" 
                placeholder="Contoh: 20.000"
                inputmode="numeric"
              />
            </div>
          </div>

          <div class="input-group">
            <label class="input-label">Keterangan</label>
            
            <div class="input-wrapper">
              <span class="currency"></span>
              <input 
                type="text" 
                id="keteranganInput" 
                placeholder="Contoh: Uang Makan"
                inputmode="text"
              />
            </div>
          </div>



          <!-- TOMBOL SIMPAN -->
          <button id="saveSaldoBtn" class="primary-btn">
            Simpan
          </button>



          <!-- =========================
              RINCIAN TRANSAKSI
          ========================= -->
          <div class="rincian-wrapper">

            <h3 class="rincian-title">Rincian</h3>

            <!-- LIST TRANSAKSI (akan diisi JS) -->
            <div id="transaksiList" class="rincian-list">

              <!-- contoh dummy (nanti dihapus JS) -->
              <div class="rincian-item">
                <span class="rincian-desc">Uang Makan</span>
                <span class="rincian-nominal">200.000</span>

                <button class="delete-btn">
                  <img src="assets/icons/icon-x.svg" alt="delete" />
                </button>
              </div>

            </div>

          </div>



          

      </section>







      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-saldo.svg" alt="Saldo">
          </div>
          <span>Saldo</span>
        </a>

        <a href="stok.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-stok.svg" alt="Saldo">
          </div>
          <span>Stok</span>
        </a>

        <a href="menu.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-menu.svg" alt="Saldo">
          </div>
          <span>Menu</span>
        </a>

        <a href="transaksi.html" class="nav-item active">
          <div class="nav-icon">
            <img src="assets/icons/icon-transaksi.svg" alt="Saldo">
          </div>
          <span>Transaksi</span>
        </a>

        <a href="lainnya.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-lainnya.svg" alt="Saldo">
          </div>
          <span>Laporan</span>
        </a>
      </nav>


    </section>
  </main>


<script>
  const isLogin = localStorage.getItem("login");

  if (!isLogin) {
    window.location.href = "index.html";
  }
</script>

    <script src="js/transaksi.js" type="module"></script>
    <script src="js/tab-transaksi.js" type="module"></script>
    <script src="js/transaksi-masuk.js" type="module"></script>
</body>
</html>

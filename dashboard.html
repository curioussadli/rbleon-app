<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
  <main class="phone-shell">
    <section class="app-screen">




      

      <!-- Dashboard Content -->
      <section class="dashboard-main">

        <!-- Header -->
        <div class="dashboard-page">

          <!-- TOP NAVBAR -->
          <div class="topbar">

            <h2 class="topbar-title">Saldo</h2>

          </div>


        </div>


        

        <!-- =========================
            TOGGLE
        ========================= -->
        <div class="toggle-wrapper">
          <button id="saldoBtn" class="toggle-btn">Saldo</button>
          <button id="inputBtn" class="toggle-btn">Input</button>
        </div>

        <!-- =========================
            TAB SALDO
        ========================= -->
        <div id="saldoContent">

          <!-- Summary -->
          <div class="summary-card">
            <div class="summary-item akhir">
              <span class="summary-label">Saldo Akhir (Rp)</span>
              <span class="summary-value">
                <span class="amount" id="saldoAkhir">0</span>
              </span>
            </div>

            <div class="summary-item awal">
              <span class="summary-label">Saldo Awal (Rp)</span>
              <span class="summary-value">
                <span class="amount" id="saldoAwal">0</span>
              </span>
            </div>
          </div>

          <!-- Mini Summary -->
          <div class="summary-row">
            <div class="mini-box pemasukan">
              <span class="mini-label">Pemasukan</span>
              <span class="mini-value">
                <span class="currency">Rp</span>
                <span class="amount" id="pemasukanValue">0</span>
              </span>
            </div>

            <div class="mini-box pengeluaran">
              <span class="mini-label">Pengeluaran</span>
              <span class="mini-value">
                <span class="currency">Rp</span>
                <span class="amount" id="pengeluaranValue">0</span>
              </span>
            </div>
          </div>

          <!-- Pendapatan -->
          <div class="pendapatan-list">
            <div class="pendapatan-item">
              <span>Pendapatan</span>
              <strong id="pendapatan">Rp 0</strong>
            </div>

            <div class="pendapatan-item">
              <span>Selisih +/-</span>
              <strong id="selisih">Rp 0</strong>
            </div>
          </div>



          <!-- Placeholder -->
          <div id="tabContent" class="empty-card">
            <h3>Keterangan</h3>
            <p>Konten masih kosong dulu.</p>
          </div>

        </div>

        <!-- =========================
            TAB INPUT
        ========================= -->
        <div id="inputContent" style="display: none;">

          <div class="input-group">
            <label class="input-label">Saldo Awal</label>
            
            <div class="input-wrapper">
              <span class="currency">Rp</span>
              <input 
                type="text" 
                id="saldoAwalInput" 
                placeholder="0"
                inputmode="numeric"
              />
            </div>
          </div>

          <!-- TOMBOL SIMPAN -->
          <button id="saveSaldoBtn" class="primary-btn">
            Simpan
          </button>



          <!-- =========================
              SALDO AKHIR
          ========================= -->
          <div class="input-group">
            <label class="input-label">Saldo Akhir</label>
            
            <div class="input-wrapper">
              <span class="currency">Rp</span>
              <input 
                type="text" 
                id="saldoAkhirInput"
                placeholder="0"
                inputmode="numeric"
              />
            </div>
          </div>

          <!-- TOMBOL SIMPAN -->
          <button id="saveSaldoAkhirBtn" class="primary-btn">
            Simpan
          </button>






          <div class="empty-card">
            <h3>Keterangan</h3>
            <p>Isi tampilan di sini nanti</p>
          </div>

        </div>


      </section>



      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
          <div class="nav-icon">
            <img src="assets/icons/icon-saldo.svg" alt="Saldo">
          </div>
          <span>Saldo</span>
        </a>

        <a href="stok.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-stok.svg" alt="Saldo">
          </div>
          <span>Stok</span>
        </a>

        <a href="menu.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-menu.svg" alt="Saldo">
          </div>
          <span>Menu</span>
        </a>

        <a href="transaksi.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-transaksi.svg" alt="Saldo">
          </div>
          <span>Transaksi</span>
        </a>

        <a href="lainnya.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-lainnya.svg" alt="Saldo">
          </div>
          <span>Laporan</span>
        </a>
      </nav>


    </section>
  </main>


<script>
  const isLogin = localStorage.getItem("login");

  if (!isLogin) {
    window.location.href = "index.html";
  }
</script>


  <!-- <script src="js/main.js" defer></script> -->
  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>

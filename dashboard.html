<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />

  <!-- =====================================================
       📱 RESPONSIVE MOBILE VIEW
  ===================================================== -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <title>Dashboard</title>

  <!-- =====================================================
       🎨 GLOBAL STYLES
  ===================================================== -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">

  <!-- =====================================================
       🔤 FONT
  ===================================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <main class="phone-shell">
    <section class="app-screen">

      <!-- =====================================================
           📊 DASHBOARD MAIN WRAPPER
      ===================================================== -->
      <section class="dashboard-main">

        <!-- =====================================================
             🧭 TOP BAR
        ===================================================== -->
        <div class="dashboard-page">
          <div class="topbar">

            <!-- 🔥 TITLE (akan bisa diubah via JS nanti) -->
            <h2 class="topbar-title" id="pageTitle">Saldo</h2>

          </div>
        </div>


        <!-- =====================================================
             🔘 TAB SWITCHER
        ===================================================== -->
        <div class="toggle-wrapper">

          <!-- TAB: SALDO (DEFAULT ACTIVE) -->
          <button id="saldoBtn" class="toggle-btn active">
            Saldo
          </button>

          <!-- TAB: INPUT -->
          <button id="inputBtn" class="toggle-btn">
            Input
          </button>

        </div>


        <!-- =====================================================
             📊 TAB CONTENT: SALDO
        ===================================================== -->
        <div id="saldoContent">

          <!-- 💰 SALDO SUMMARY -->
          <div class="summary-card">

            <!-- SALDO AKHIR -->
            <div class="summary-item akhir">
              <span class="summary-label">Saldo Akhir (Rp)</span>
              <span class="summary-value">
                <span class="amount" id="saldoAkhir">0</span>
              </span>
            </div>

            <!-- SALDO AWAL -->
            <div class="summary-item awal">
              <span class="summary-label">Saldo Awal (Rp)</span>
              <span class="summary-value">
                <span class="amount" id="saldoAwal">0</span>
              </span>
            </div>

          </div>


          <!-- 📊 MINI SUMMARY -->
          <div class="summary-row">

            <!-- PEMASUKAN -->
            <div class="mini-box pemasukan">
              <span class="mini-label">Pemasukan</span>
              <span class="mini-value">
                <span class="currency">Rp</span>
                <span class="amount" id="pemasukanValue">0</span>
              </span>
            </div>

            <!-- PENGELUARAN -->
            <div class="mini-box pengeluaran">
              <span class="mini-label">Pengeluaran</span>
              <span class="mini-value">
                <span class="currency">Rp</span>
                <span class="amount" id="pengeluaranValue">0</span>
              </span>
            </div>

          </div>


          <!-- 📈 SUMMARY PERHITUNGAN -->
          <div class="pendapatan-list">

            <div class="pendapatan-item">
              <span>Pendapatan</span>
              <strong id="pendapatan">Rp 0</strong>
            </div>

            <div class="pendapatan-item">
              <span>Selisih +/-</span>
              <strong id="selisih">Rp 0</strong>
            </div>

          </div>


          <!-- 📝 INFO -->
          <div class="empty-card">
            <h3>Keterangan</h3>
            <p>Konten masih kosong dulu.</p>
          </div>

        </div>


        <!-- =====================================================
             📝 TAB CONTENT: INPUT
        ===================================================== -->
        <div id="inputContent" style="display:none;">

          <!-- INPUT SALDO AWAL -->
          <div class="input-group">

            <label class="input-label">Saldo Awal</label>

            <div class="input-wrapper">
              <span class="currency">Rp</span>

              <input
                type="text"
                id="saldoAwalInput"
                placeholder="0"
                inputmode="numeric"
              />
            </div>

          </div>

          <!-- BUTTON SIMPAN -->
          <button id="saveSaldoBtn" class="primary-btn">
            Simpan
          </button>


          <!-- INPUT SALDO AKHIR -->
          <div class="input-group">

            <label class="input-label">Saldo Akhir</label>

            <div class="input-wrapper">
              <span class="currency">Rp</span>

              <input
                type="text"
                id="saldoAkhirInput"
                placeholder="0"
                inputmode="numeric"
              />
            </div>

          </div>

          <!-- BUTTON SIMPAN -->
          <button id="saveSaldoAkhirBtn" class="primary-btn">
            Simpan
          </button>


          <!-- INFO -->
          <div class="empty-card">
            <h3>Keterangan</h3>
            <p>Input saldo akan disimpan ke Firebase realtime.</p>
          </div>

        </div>

      </section>


      <!-- =====================================================
           📱 BOTTOM NAVIGATION
      ===================================================== -->
      <nav class="bottom-nav">

        <a href="dashboard.html" class="nav-item active">
          <div class="nav-icon">
            <img src="assets/icons/icon-saldo.svg" alt="Saldo">
          </div>
          <span>Saldo</span>
        </a>

        <a href="stok.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-stok.svg" alt="Stok">
          </div>
          <span>Stok</span>
        </a>

        <a href="menu.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-menu.svg" alt="Menu">
          </div>
          <span>Menu</span>
        </a>

        <a href="transaksi.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-transaksi.svg" alt="Transaksi">
          </div>
          <span>Transaksi</span>
        </a>

        <a href="lainnya.html" class="nav-item">
          <div class="nav-icon">
            <img src="assets/icons/icon-lainnya.svg" alt="Laporan">
          </div>
          <span>Laporan</span>
        </a>

      </nav>

    </section>
  </main>


  <!-- =====================================================
       ⚙️ DASHBOARD LOGIC (FIREBASE + TAB SYSTEM)
  ===================================================== -->
  <script type="module" src="js/dashboard.js"></script>

</body>
</html>
